<div class="form-container">
  <h2>Reactive Enrollment Form</h2>
  
  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Name</label>
      <input type="text" formControlName="studentName">
      <span class="error-msg" *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']">Name is required.</span>
      <span class="error-msg" *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']">Name must be at least 3 characters.</span>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="studentEmail">
      <span class="error-msg" *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']">Email is required.</span>
      <span class="error-msg" *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']">Invalid email format.</span>
      <span class="error-msg" *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['emailTaken']">Email is already taken.</span>
      <span class="info-msg" *ngIf="enrollForm.get('studentEmail')?.pending">Checking email...</span>
    </div>

    <div class="form-group">
      <label>Course Code</label>
      <input type="text" formControlName="courseId">
      <span class="error-msg" *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['required']">Course Code is required.</span>
      <span class="error-msg" *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['noCourseCode']">Course code starting with XX is not allowed.</span>
    </div>

    <div class="form-group">
      <label>Preferred Semester</label>
      <select formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <!-- Form Array -->
    <div class="form-group">
      <label>Additional Courses</label>
      <button type="button" class="btn" style="width: fit-content; margin-bottom: 1rem; background: var(--secondary);" (click)="addCourse()">Add Another Course</button>
      <div formArrayName="additionalCourses">
        <div *ngFor="let ctrl of additionalCourses.controls; let i=index" style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
          <input [formControlName]="i" style="flex: 1;" placeholder="Enter additional course code">
          <button type="button" class="btn" style="background: red; padding: 0.5rem;" (click)="removeCourse(i)">X</button>
        </div>
      </div>
    </div>

    <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" formControlName="agreeToTerms">
        I agree to the terms and conditions
      </label>
    </div>

    <div class="btn-group">
      <button type="submit" class="btn btn-primary" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" class="btn btn-secondary" (click)="enrollForm.reset()">Reset</button>
    </div>
  </form>
</div>

<div class="list-container">
  <h2>Available Courses</h2>
  
  <p *ngIf="isLoading$ | async; else courseGrid">Loading courses...</p>
  
  <ng-template #courseGrid>
    <p class="error-msg" *ngIf="error$ | async as error">Error: {{ error }}</p>
    <div class="grid-container" style="margin-top: 1rem;" *ngIf="(courses$ | async) as courses">
      <div *ngIf="courses.length > 0; else noCourses" style="display: contents;">
        <app-course-card 
          *ngFor="let c of courses; trackBy: trackByCourseId" 
          [course]="c" 
          (enrollRequested)="onEnroll($event)">
        </app-course-card>
      </div>
    </div>
  </ng-template>

  <ng-template #noCourses>
    <p class="empty-state">No courses available.</p>
  </ng-template>
  
  <p *ngIf="selectedCourseId" style="margin-top: 2rem; padding: 1rem; background: var(--secondary); border-radius: 8px;">
    Selected course ID: {{ selectedCourseId }}
  </p>
</div>

<div class="home-container">
  <h1>Welcome to the {{ portalName }}</h1>
  <p>Your one-stop destination for managing courses, tracking grades, and staying updated with campus activities.</p>
  
  <div style="margin-bottom: 2rem;">
    <button class="action-btn" [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
    <p *ngIf="message" style="color: var(--secondary); margin-top: 0.5rem;">{{ message }}</p>
  </div>

  <div style="margin-bottom: 2rem;">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Search courses..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--card-bg); color: white;">
    <p style="margin-top: 0.5rem; color: var(--text-muted);">Searching for: {{ searchTerm }}</p>
  </div>
  
  <div class="stats-row">
    <div class="stat-card">
      <h3>Courses Available</h3>
      <p>12</p>
    </div>
    <div class="stat-card">
      <h3>Enrolled</h3>
      <p>3</p>
    </div>
    <div class="stat-card">
      <h3>GPA</h3>
      <p>3.8</p>
    </div>
  </div>
</div>
